<!doctype html>
<html>
  <head>
    <title>Gallery</title>

    <style>
      .header {
        text-align: center;
        font-size: 24px;
      }

      .gallery {
        width: 200px;
        height: 200px;
        border: 2px solid black;
        display: inline-block;
        margin: 10px;
        text-align: center;
        line-height: 200px;
      }

      .gallery:hover {
        background-color: grey;
        color: white;
      }

      .footer {
        text-align: center;
        margin-top: 50px;
      }
    </style>
  </head>

  <body>
    <div class="header">Gallery Page</div>

    <div class="gallery">Image 1</div>
    <div class="gallery">Image 2</div>
    <div class="gallery">Image 3</div>
    <br />

    <div class="gallery">Image 4</div>
    <div class="gallery">Image 5</div>
    <div class="gallery">Image 6</div>

    <div class="footer">Footer for gallery page</div>
  </body>
</html>
