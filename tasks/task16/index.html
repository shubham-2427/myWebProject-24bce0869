<!DOCTYPE html>
<html>
<head>
  <title>Product Catalog</title>
  <style>
    body {
      font-family: Arial;
    }
    h2 {
      text-align: center;
    }
    table {
      width: 800px;
      margin: 20px;
      border: 1px solid black;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: gray;
      color: white;
    }
    tr:nth-child(even) {
      background-color: lightgrey;
    }
    tr:hover {
      background-color: lightblue;
    }
    img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<h2>Product Catalog</h2>

<table>
  <tr>
    <th>Product Image</th>
    <th>Product Name</th>
    <th>Price</th>
    <th>Description</th>
  </tr>

  <tr>
    <td><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=100&h=100&fit=crop&auto=format" alt="Smart watch"></td>
    <td>Smart watch</td>
    <td>Rs 730</td>
    <td>watch that tracks your daily activity too.</td>
  </tr>

  <tr>
    <td><img src="https://images.unsplash.com/photo-1570197788417-0e82375c9371?w=100&h=100&fit=crop&auto=format" alt="Compact juicer"></td>
    <td>Compact juicer</td>
    <td>Rs 1890</td>
    <td>compact juicer ideal for travel.</td>
  </tr>

  <tr>
    <td><img src="https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=100&h=100&fit=crop&auto=format" alt="Study lamp"></td>
    <td>Study lamp</td>
    <td>Rs 640</td>
    <td>lamp that can be charged with sunlight.</td>
  </tr>

  <tr>
    <td><img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=100&h=100&fit=crop&auto=format" alt="Gaming table"></td>
    <td>Gaming table</td>
    <td>Rs 2680</td>
    <td>height adjustable gaming table.</td>
  </tr>

</table>

</body>
</html>
