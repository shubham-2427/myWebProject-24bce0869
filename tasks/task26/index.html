<!DOCTYPE html>
<html>
<head>
    <title>My Registration Page</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <div class="main-box">
        <h1>Sign Up Here</h1>
        <hr>
        
        <form>
            <div class="column">
                <label>First Name:</label><br>
                <input type="text" name="fname" placeholder="Enter First Name">
                
                <label>Email Address:</label><br>
                <input type="email" name="email" placeholder="mail@example.com">
                
                <label>Password:</label><br>
                <input type="password" name="pass">
                
                <label>Date of Birth:</label><br>
                <input type="date" name="dob">
            </div>

            <div class="column">
                <label>Last Name:</label><br>
                <input type="text" name="lname" placeholder="Enter Last Name">
                
                <label>Phone Number:</label><br>
                <input type="text" name="phone" placeholder="000-000-0000">
                
                <label>Confirm Password:</label><br>
                <input type="password" name="confirm">
                
                <label>Gender:</label><br>
                <div class="gender-section">
                    <input type="radio" name="gender" id="m"> <label for="m">Male</label>
                    <input type="radio" name="gender" id="f"> <label for="f">Female</label>
                </div>
            </div>

            <div class="full-width">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to the Terms and Conditions</label>
                
                <br><br>
                <input type="submit" value="Register Now" class="my-button">
            </div>
        </form>
    </div>

</body>
</html>
