<html>
<head>
    <meta charset="UTF-8">
    <title>Login and Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: lightgray;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px;
        }
        .form-box {
            width: 300px;
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 15px;
            background-color: blue;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            color: black;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .options {
            margin: 10px 0;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 4px;
            margin-top: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Login</h2>
        <label>Username</label>
        <input type="text">
        <label>Password</label>
        <input type="password">
        <div class="options">
            <input type="checkbox"> Remember me
        </div>
        <button>Login</button>
    </div>

    <div class="form-box">
        <h2>Register</h2>
        <label>Full Name</label>
        <input type="text">
        <label>Email</label>
        <input type="email">
        <label>Password</label>
        <input type="password">
        <label>Confirm Password</label>
        <input type="password">
        <div class="options">
            Gender:
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </div>
        <button>Register</button>
    </div>

</body>
</html>
