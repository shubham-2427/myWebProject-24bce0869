<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }
    .topnav table {
      width: 100%;
      background-color: black;
      color: white;
    }
    .topnav td {
      padding: 15px;
      text-align: center;
    }
    .topnav td:hover {
      background-color: #333;
      cursor: pointer;
    }
    .sidebar {
      width: 180px;
      height: 300px;
      background-color: lightgray;
      float: left;
      padding: 10px;
    }
    .sidebar ul {
      padding: 0;
    }
    .sidebar li {
      background-color: gray;
      margin-bottom: 10px;
      padding: 8px;
      color: white;
      list-style: none;
    }
    .sidebar li:hover {
      background-color: darkgray;
      cursor: pointer;
    }
    .main {
      margin-left: 200px;
      padding: 15px;
    }
  </style>
</head>
<body>

<div class="topnav">
  <table>
    <tr>
      <td>Home</td>
      <td>Reports</td>
      <td>Settings</td>
      <td>Logout</td>
    </tr>
  </table>
</div>

<div class="sidebar">
  <ul>
    <li>Overview</li>
    <li>Sales</li>
    <li>Users</li>
    <li>Support</li>
  </ul>
</div>

<div class="main">
  <h2>Dashboard</h2>
  <p>Main content page of the page.</p>
</div>

</body>
</html>
