<!doctype html>
<html>
  <head>
    <title>jQuery Highlight Toggle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        padding: 40px;
      }
      p {
        font-size: 18px;
        cursor: pointer;
      }
      .highlight {
        background: lightblue;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <p id="para1">This is the first paragraph. Click to toggle highlight.</p>
    <p id="para2">This is the second paragraph. Click to toggle highlight.</p>

    <script>
      $(document).ready(function () {
        $("p").addClass("highlight");

        $("p").click(function () {
          $(this).toggleClass("highlight");
        });
      });
    </script>
  </body>
</html>
