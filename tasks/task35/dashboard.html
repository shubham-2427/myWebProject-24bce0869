<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>

<body>

    <h2 id="welcome"></h2>

<script>
    var username = localStorage.getItem("username");

    if (username) {
        document.getElementById("welcome").innerHTML =
            "Welcome " + username;
    } else {
        window.location.href = "login.html";
    }
</script>

</body>
</html>
