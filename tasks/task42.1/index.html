<!DOCTYPE html>
<html>
<head>
<title>Modal Cards</title>

<style>

body{
    font-family: Arial;
    text-align: center;
    background: #74ebd5;
    height:100vh;
}

button{
    padding:10px 20px;
    margin:15px;
    border:none;
    border-radius:5px;
    background:#333;
    color:white;
    cursor:pointer;
}

.overlay{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(3px);
    opacity:0;
    z-index:-1;
    transition:0.4s;
}

.modal{
    position: fixed;
    top:50%;
    left:50%;
    transform: translate(-50%,-50%) scale(0.9);
    width:280px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    opacity:0;
    z-index:-1;
    transition:0.4s;
}

input{
    width:85%;
    padding:8px;
    margin:8px;
    border:1px solid gray;
    border-radius:4px;
}

.cardBtn{
    background:#007BFF;
    color:white;
    width:92%;
}

</style>
</head>

<body>

<h2 style="color:rgb(66, 43, 43);">Dashboard</h2>

<button onclick="openCard('login')">Login</button>
<button onclick="openCard('signup')">Signup</button>
<button onclick="openCard('confirm')">Confirmation</button>

<div class="overlay" id="bg_login" onclick="closeCard('login')"></div>
<div class="modal" id="login">
    <h3>Login</h3>
    <input placeholder="Username">
    <input type="password" placeholder="Password">
    <button class="cardBtn">Login Now</button>
</div>

<div class="overlay" id="bg_signup" onclick="closeCard('signup')"></div>
<div class="modal" id="signup">
    <h3>Create Account</h3>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="cardBtn">Signup</button>
</div>

<div class="overlay" id="bg_confirm" onclick="closeCard('confirm')"></div>
<div class="modal" id="confirm">
    <h3>Confirmation</h3>
    <p>Your registration is successful.</p>
    <button class="cardBtn">Continue</button>
</div>

<script>

let zIndexValue = 1000;

function openCard(id){

    let modal = document.getElementById(id);
    let bg = document.getElementById("bg_" + id);

    bg.style.zIndex = 999;
    bg.style.opacity = 1;

    modal.style.zIndex = zIndexValue++;
    modal.style.opacity = 1;
    modal.style.transform = "translate(-50%,-50%) scale(1)";
}

function closeCard(id){

    let modal = document.getElementById(id);
    let bg = document.getElementById("bg_" + id);

    modal.style.opacity = 0;
    modal.style.zIndex = -1;
    modal.style.transform = "translate(-50%,-50%) scale(0.9)";

    bg.style.opacity = 0;
    bg.style.zIndex = -1;
}

</script>

</body>
</html>
