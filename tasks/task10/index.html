<!doctype html>
<html>
  <head>
    <title>Contact Us</title>

    <style>
      .header {
        text-align: center;
        font-size: 30px;
        font-weight: bold;
      }

      .container {
        width: 800px;
        margin: auto;
      }

      .contact-box {
        border: 1px solid #ccc;
        padding: 10px;
        margin-bottom: 10px;
      }

      .map {
        text-align: center;
        margin-top: 20px;
      }

      .footer {
        text-align: center;
        margin-top: 50px;
      }
    </style>
  </head>

  <body>
    <div class="header">Contact Us</div>

    <div class="container">
      <div class="contact-box">
        Address <br />
        VIT Main Street, Vellore, Tamil Nadu
      </div>

      <div class="contact-box">
        Phone <br />
        +91 9876543210
      </div>

      <div class="contact-box">
        Email <br />
        mycompany@gmail.com
      </div>

      <div class="map">
        <img src="map.png" width="800" height="400" />
      </div>
    </div>

    <div class="footer">Our company footer</div>
  </body>
</html>
