<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Product Layout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 50px auto;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .box {
            flex: 1;
            background: #ffffff;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .box img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .box h3 {
            margin: 15px 0 10px;
        }
        .box p {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&h=200&fit=crop&auto=format" alt="Product 1">
            <h3>Product One</h3>
            <p>Short product description goes here.</p>
        </div>

        <div class="box">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=200&fit=crop&auto=format" alt="Product 2">
            <h3>Product Two</h3>
            <p>Short product description goes here.</p>
        </div>

        <div class="box">
            <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=300&h=200&fit=crop&auto=format" alt="Product 3">
            <h3>Product Three</h3>
            <p>Short product description goes here.</p>
        </div>
    </div>

</body>
</html>
