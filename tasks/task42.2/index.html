<!DOCTYPE html>
<html lang="en">
<head>
  <title>Product Card Tooltip Z-Index Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      padding: 40px;
    }

    .stack {
      display: flex;
      align-items: flex-start;
    }

    .card {
      width: 220px;
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      position: relative;   
      z-index: 10;         
      margin-left: -90px;   
      transition: transform 0.2s ease;
    }

    .card:nth-child(2) { z-index: 15; }
    .card:nth-child(3) { z-index: 20; }

    .card:first-child { margin-left: 0; }

    .card:hover { transform: translateY(-4px); }

    .image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .title { font-weight: bold; margin-bottom: 6px; }
    .price { color: #4a4a4a; }

    .tooltip {
      position: absolute;  
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      font-size: 12px;
      display: none;
      z-index: 20;       
      margin-bottom: 8px;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <h2>Overlapping Product Cards</h2>

  <div class="stack">

    <div class="card">
      <div class="tooltip">Free delivery available</div>
      <div class="image">
        <img src="headphone.jpeg">
      </div>
      <div class="title">Wireless Headphones</div>
      <div class="price">Rs 2,499</div>
    </div>

    <div class="card">
      <div class="tooltip">2 Year Warranty</div>
      <div class="image">
        <img src="watch.jpg">
      </div>
      <div class="title">Smart Watch</div>
      <div class="price">Rs 3,199</div>
    </div>

    <div class="card">
      <div class="tooltip">Limited Time Offer</div>
      <div class="image">
        <img src="speaker.jpg">
      </div>
      <div class="title">Bluetooth Speaker</div>
      <div class="price">Rs 1,799</div>
    </div>

  </div>

  <script>
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      const tooltip = card.querySelector('.tooltip');

      card.addEventListener('mouseenter', () => {
        tooltip.style.zIndex = 999;
        tooltip.style.display = 'block';
      });

      card.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
        tooltip.style.zIndex = 20;
      });
    });
  </script>

</body>
</html>
