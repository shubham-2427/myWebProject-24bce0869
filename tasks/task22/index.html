<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Store - Product Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Product</h1>

    <div class="container">

        <div class="product-card">
            <img src="headphone.webp" alt="Product Image" class="product-image">

            <h2 class="product-name">Wireless Headphones</h2>

            <p class="price">21000</p>

            <div class="rating">
                ★★★★☆ <span>(4.0)</span>
            </div>

            <p class="description">
                High-quality wireless headphones with noise cancellation,
                long battery life, and superior comfort.
            </p>

            <button class="add-to-cart">Add to Cart</button>
        </div>
    </div>

</body>
</html>
